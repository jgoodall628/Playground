databases:
  - name: playground-db
    plan: free
    databaseName: playground
    user: playground

services:
  - type: web
    name: playground-api
    runtime: ruby
    plan: free
    rootDir: backend
    buildCommand: bundle install && bundle exec rails db:migrate db:seed
    startCommand: bundle exec puma -C config/puma.rb
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: playground-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
