name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    if: contains(toJSON(github.event.commits.*.modified), 'backend/') ||
        contains(toJSON(github.event.commits.*.added), 'backend/')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy
        run: curl -s "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

  update-frontend:
    if: contains(toJSON(github.event.commits.*.modified), 'frontend/') ||
        contains(toJSON(github.event.commits.*.added), 'frontend/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish OTA update
        working-directory: frontend
        run: eas update --branch preview --message "${{ github.event.head_commit.message }}" --environment preview --non-interactive
