name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rubocop:
    name: RuboCop
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3.6'
          bundler-cache: true
          working-directory: backend

      - name: Run RuboCop
        run: bundle exec rubocop --format github
